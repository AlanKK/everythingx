name: Build Mac arm64

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        architecture: [arm64]
    env:
      BUILD_MAC: true
        
    steps:
    - uses: actions/checkout@v4

    - name: Env
      run: |
        env
        whoami
        ls -al
        df -h
        uname -a

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: test
      run: make test
      
    - name: Build
      run: make

    - name: Upload package
      if: ${{ env.BUILD_MAC == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: bin/* install.sh uninstall.sh *.plist
        path: everythingx.macos-${{ matrix.architecture }}.zip

