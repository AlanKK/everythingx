name: Build, Test and Release

on:
  push:
    branches: [ "main", "linux-support" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.runner }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
            os_name: macos-apple-arm64
            platform: darwin
          - runner: macos-15-intel
            arch: amd64
            os_name: macos-intel-amd64
            platform: darwin
          - runner: ubuntu-latest
            arch: amd64
            os_name: linux-amd64
            platform: linux

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Install Linux build dependencies
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          libgl1-mesa-dev \
          xorg-dev \
          libxcursor-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxi-dev \
          libxxf86vm-dev \
          gcc

    - name: Determine package version
      id: pkg
      run: |
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
        else
          echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
        fi

    - name: Unit tests
      run: make test

    - name: Build
      run: make build

    - name: End-to-end test
      if: matrix.platform == 'darwin'
      run: make e2e

    # macOS: build .pkg
    - name: Install fyne
      if: matrix.platform == 'darwin' && github.event_name != 'pull_request'
      run: go install fyne.io/fyne/v2/cmd/fyne@latest

    - name: Build macOS .pkg
      if: matrix.platform == 'darwin' && github.event_name != 'pull_request'
      run: |
        PKG_VERSION=${{ steps.pkg.outputs.version }} make pkg
        mv EverythingX.pkg EverythingX_${{ matrix.os_name }}.pkg

    # Linux: build .deb and .rpm
    - name: Install nfpm
      if: matrix.platform == 'linux' && github.event_name != 'pull_request'
      run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

    - name: Build .deb package
      if: matrix.platform == 'linux' && github.event_name != 'pull_request'
      run: VERSION=${{ steps.pkg.outputs.version }} make deb

    - name: Build .rpm package
      if: matrix.platform == 'linux' && github.event_name != 'pull_request'
      run: VERSION=${{ steps.pkg.outputs.version }} make rpm

    # Upload artifacts
    - name: Copy binaries for packaging
      run: cp bin/everythingxd bin/ev .

    - name: Copy macOS plist for packaging
      if: matrix.platform == 'darwin'
      run: cp cmd/service/com.github.alankk.everythingxd.plist .

    - name: Copy Linux service file for packaging
      if: matrix.platform == 'linux'
      run: cp cmd/service/everythingxd.service .

    - name: Upload artifact (macOS)
      if: matrix.platform == 'darwin'
      uses: actions/upload-artifact@v4
      with:
        name: everythingx_${{ matrix.os_name }}
        path: |
          everythingx
          ev
          everythingxd
          install.sh
          uninstall.sh
          com.github.alankk.everythingxd.plist
        if-no-files-found: error

    - name: Upload artifact (macOS pkg)
      if: matrix.platform == 'darwin' && github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: everythingx_pkg_${{ matrix.os_name }}
        path: EverythingX_${{ matrix.os_name }}.pkg
        if-no-files-found: error

    - name: Upload artifact (Linux)
      if: matrix.platform == 'linux'
      uses: actions/upload-artifact@v4
      with:
        name: everythingx_${{ matrix.os_name }}
        path: |
          ev
          everythingxd
          install-linux.sh
          uninstall-linux.sh
          everythingxd.service
        if-no-files-found: error

    - name: Upload artifact (Linux deb)
      if: matrix.platform == 'linux' && github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: everythingx_deb
        path: bin/*.deb
        if-no-files-found: error

    - name: Upload artifact (Linux rpm)
      if: matrix.platform == 'linux' && github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: everythingx_rpm
        path: bin/*.rpm
        if-no-files-found: error

  # Package installation tests — run on pushes to main and tags, not on PRs
  test-macos-pkg:
    name: Test macOS pkg (${{ matrix.os_name }})
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest
            os_name: macos-apple-arm64
          - runner: macos-15-intel
            os_name: macos-intel-amd64
    steps:
      - name: Download pkg artifact
        uses: actions/download-artifact@v4
        with:
          name: everythingx_pkg_${{ matrix.os_name }}

      - name: Install pkg
        run: sudo installer -pkg "EverythingX_${{ matrix.os_name }}.pkg" -target /

      - name: Verify installation
        run: |
          test -d /Applications/EverythingX.app
          test -f /Applications/EverythingX.app/Contents/MacOS/everythingx

      - name: Cleanup
        if: always()
        run: sudo rm -rf /Applications/EverythingX.app

  test-linux-deb:
    name: Test Linux .deb
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Install build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gcc

      - name: Download deb artifact
        uses: actions/download-artifact@v4
        with:
          name: everythingx_deb

      - name: Install .deb package
        run: sudo dpkg -i *.deb

      - name: Verify installation
        run: |
          test -x /usr/local/bin/everythingxd
          test -x /usr/local/bin/ev
          ev --version
          everythingxd --version

      - name: Stop daemon and run e2e test
        run: |
          sudo systemctl stop everythingxd
          mkdir -p bin
          ln -s /usr/local/bin/everythingxd bin/everythingxd
          go build -tags fts5 -o e2eTest/e2etest e2eTest/main.go
          sudo e2eTest/e2etest

      - name: Cleanup
        if: always()
        run: sudo dpkg -r everythingx || true

  test-linux-rpm:
    name: Test Linux .rpm
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends gcc rpm

      - name: Download rpm artifact
        uses: actions/download-artifact@v4
        with:
          name: everythingx_rpm

      - name: Extract and install RPM contents
        run: |
          rpm -qlp *.rpm
          mkdir rpm-extract && cd rpm-extract
          rpm2cpio ../*.rpm | cpio -idmv
          sudo cp usr/local/bin/everythingxd /usr/local/bin/
          sudo cp usr/local/bin/ev /usr/local/bin/
          sudo chmod +x /usr/local/bin/everythingxd /usr/local/bin/ev

      - name: Verify installation
        run: |
          ev --version
          everythingxd --version

      - name: Run e2e test
        run: |
          mkdir -p bin
          ln -s /usr/local/bin/everythingxd bin/everythingxd
          go build -tags fts5 -o e2eTest/e2etest e2eTest/main.go
          sudo e2eTest/e2etest

      - name: Cleanup
        if: always()
        run: sudo rm -f /usr/local/bin/everythingxd /usr/local/bin/ev || true

  release:
    name: Create GitHub Release
    needs: [build, test-macos-pkg, test-linux-deb, test-linux-rpm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Package macOS artifacts as zip
      run: |
        for dir in artifacts/everythingx_macos-*; do
          [[ "$dir" == *_pkg_* ]] && continue
          name=$(basename "$dir")
          zip -j "${name}.zip" "$dir"/*
        done

    - name: Collect packages
      run: |
        cp artifacts/everythingx_deb/*.deb .
        cp artifacts/everythingx_rpm/*.rpm .

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          *.zip
          *.deb
          *.rpm
          artifacts/everythingx_pkg_*/*.pkg


