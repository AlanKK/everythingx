name: Build Mac arm64

on:
  push:
    branches: [ "build-macos-arm64" ]
  pull_request:
    branches: [ "build-macos-arm64" ]

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        architecture: [arm64]
        
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Build
      run: make zip

    - name: Rename zip
      run: mv everythingx.zip everythingx.${{ matrix.architecture }}.zip

    - name: Upload package
      uses: actions/upload-artifact@v4
      with:
        name: everythingx.${{ matrix.architecture }}.zip
        path: everythingx.${{ matrix.architecture }}.zip

    # - name: Package app bundles
