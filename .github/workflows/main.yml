name: Build Mac arm64

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        architecture: [arm64]
    env:
      BUILD_MAC: true
        
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: test
      run: make test
      
    - name: Build
      run: make

    - name: Upload package
      if: ${{ env.BUILD_MAC == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: everythingx.${{ RUNNER_OS }}-${{ RUNNER_OS }}
        path: |
          bin/everythingx
          bin/ev
          bin/findfilesd
          install.sh 
          uninstall.sh 
          cmd/service/com.example.findfiles.plist 
        if-no-files-found: error

