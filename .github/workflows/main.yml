name: Build, Test and Release

on:
  push:
    branches: [ "main", "linux-support" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Serialize release-producing runs on the same ref so the build-counter
# version job never reads a stale tag. Merges to main queue (never cancel)
# so every merge gets its own incremented version. Feature branches stay parallel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Compute the version once per run and decide whether to release:
  #  - push to main -> auto-increment build counter (v1.0.N), publish "Latest" release
  #  - tag v*       -> use the tag version, publish release
  #  - anything else -> 0.0.0-dev, no release
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
      release: ${{ steps.v.outputs.release }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # need full tag history for the build counter

      - id: v
        env:
          EVENT: ${{ github.event_name }}
        run: |
          release=false
          tag=""

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Explicit tag release. Strip leading 'v' (e.g. v1.2.3 -> 1.2.3).
            tag="$GITHUB_REF_NAME"
            ver="${tag#v}"
            # deb/rpm require versions starting with a digit; prefix if needed.
            if [[ ! "$ver" =~ ^[0-9] ]]; then
              ver="0.0.0+$(echo "$ver" | sed 's/^[^a-zA-Z0-9]*//')"
            fi
            release=true
          elif [[ "$EVENT" == "push" && "$GITHUB_REF" == "refs/heads/main" ]]; then
            # Auto build-counter release on every merge to main.
            git fetch --tags --force
            latest=$(git tag -l 'v1.0.*' \
              | sed -n 's/^v1\.0\.\([0-9][0-9]*\)$/\1/p' \
              | sort -n | tail -1)
            next=$(( ${latest:-0} + 1 ))
            ver="1.0.${next}"
            tag="v1.0.${next}"
            release=true
          else
            # Feature-branch push / PR / manual dispatch: build and test only.
            ver="0.0.0-dev"
          fi

          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}"     >> "$GITHUB_OUTPUT"
          echo "release=${release}" >> "$GITHUB_OUTPUT"
          echo "Resolved version=${ver} tag=${tag} release=${release}"

  build:
    name: Build and Test on ${{ matrix.runner }} (${{ matrix.arch }})
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
            os_name: macos-apple-arm64
            platform: darwin
          - runner: macos-15-intel
            arch: amd64
            os_name: macos-intel-amd64
            platform: darwin
          - runner: ubuntu-latest
            arch: amd64
            os_name: linux-amd64
            platform: linux

    steps:
    - uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.4'

    - name: Install Linux build dependencies
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          libgl1-mesa-dev \
          xorg-dev \
          libxcursor-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxi-dev \
          libxxf86vm-dev \
          libwayland-dev \
          libxkbcommon-dev \
          wayland-protocols \
          gcc

    - name: test
      run: make test

    - name: Build
      run: VERSION=${{ needs.version.outputs.version }} make build

    - name: End-to-end test
      if: matrix.platform == 'darwin'
      run: make e2e

    - name: Copy binaries for packaging
      run: cp bin/everythingxd bin/ev .

    - name: Copy macOS plist for packaging
      if: matrix.platform == 'darwin'
      run: cp cmd/service/com.github.alankk.everythingxd.plist .

    - name: Copy Linux service file for packaging
      if: matrix.platform == 'linux'
      run: cp cmd/service/everythingxd.service .

    - name: Upload artifact (macOS)
      if: matrix.platform == 'darwin'
      uses: actions/upload-artifact@v7
      with:
        name: everythingx_${{ matrix.os_name }}
        path: |
          everythingx
          ev
          everythingxd
          install.sh
          uninstall.sh
          com.github.alankk.everythingxd.plist
        if-no-files-found: error

    - name: Upload artifact (Linux)
      if: matrix.platform == 'linux'
      uses: actions/upload-artifact@v7
      with:
        name: everythingx_${{ matrix.os_name }}
        path: |
          ev
          everythingxd
          install-linux.sh
          uninstall-linux.sh
          everythingxd.service
        if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [version, build]
    runs-on: ubuntu-latest
    if: needs.version.outputs.release == 'true'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.4'

    - name: Install Linux build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          libgl1-mesa-dev \
          xorg-dev \
          libxcursor-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxi-dev \
          libxxf86vm-dev \
          libwayland-dev \
          libxkbcommon-dev \
          wayland-protocols \
          gcc

    - name: Install nfpm
      run: |
        go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

    - name: Build Linux binaries
      run: VERSION=${{ needs.version.outputs.version }} make build

    - name: Build .deb package
      run: VERSION=${{ needs.version.outputs.version }} make deb

    - name: Build .rpm package
      run: VERSION=${{ needs.version.outputs.version }} make rpm

    - name: Download all build artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts/

    - name: Package macOS artifacts as zip
      run: |
        for dir in artifacts/everythingx_macos-*; do
          name=$(basename "$dir")
          zip -j "${name}.zip" "$dir"/*
        done

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        # On auto (main) runs github.ref is a branch, so name the tag explicitly.
        # The action creates this tag at the run's commit if it does not exist.
        # (Tag is created via GITHUB_TOKEN, which does NOT re-trigger this workflow.)
        tag_name: ${{ needs.version.outputs.tag }}
        name: ${{ needs.version.outputs.tag }}
        generate_release_notes: true
        make_latest: "true"
        files: |
          *.zip
          bin/*.deb
          bin/*.rpm


