name: Build, Test and Release

on:
  push:
    branches: [ "main", "linux-support" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test on ${{ matrix.runner }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
            os_name: macos-apple-arm64
            platform: darwin
          - runner: macos-15-intel
            arch: amd64
            os_name: macos-intel-amd64
            platform: darwin
          - runner: ubuntu-latest
            arch: amd64
            os_name: linux-amd64
            platform: linux

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Install Linux build dependencies
      if: matrix.platform == 'linux'
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          libgl1-mesa-dev \
          xorg-dev \
          libxcursor-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxi-dev \
          libxxf86vm-dev \
          gcc

    - name: test
      run: make test

    - name: Build
      run: make build

    - name: End-to-end test
      if: matrix.platform == 'darwin'
      run: make e2e

    - name: Copy binaries for packaging
      run: cp bin/everythingxd bin/ev .

    - name: Copy macOS plist for packaging
      if: matrix.platform == 'darwin'
      run: cp cmd/service/com.github.alankk.everythingxd.plist .

    - name: Copy Linux service file for packaging
      if: matrix.platform == 'linux'
      run: cp cmd/service/everythingxd.service .

    - name: Upload artifact (macOS)
      if: matrix.platform == 'darwin'
      uses: actions/upload-artifact@v4
      with:
        name: everythingx_${{ matrix.os_name }}
        path: |
          everythingx
          ev
          everythingxd
          install.sh
          uninstall.sh
          com.github.alankk.everythingxd.plist
        if-no-files-found: error

    - name: Upload artifact (Linux)
      if: matrix.platform == 'linux'
      uses: actions/upload-artifact@v4
      with:
        name: everythingx_${{ matrix.os_name }}
        path: |
          ev
          everythingxd
          install-linux.sh
          uninstall-linux.sh
          everythingxd.service
        if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Install Linux build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          libgl1-mesa-dev \
          xorg-dev \
          libxcursor-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxi-dev \
          libxxf86vm-dev \
          gcc

    - name: Install nfpm
      run: |
        go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

    - name: Build Linux binaries
      run: make build

    - name: Build .deb package
      run: VERSION=${{ github.ref_name }} make deb

    - name: Build .rpm package
      run: VERSION=${{ github.ref_name }} make rpm

    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Package macOS artifacts as zip
      run: |
        for dir in artifacts/everythingx_macos-*; do
          name=$(basename "$dir")
          zip -j "${name}.zip" "$dir"/*
        done

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          *.zip
          bin/*.deb
          bin/*.rpm


